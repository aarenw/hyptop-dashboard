apiVersion: v1
kind: Namespace
metadata:
  name: hyptop-observe
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hyptop-exporter
  namespace: hyptop-observe
  labels:
    app.kubernetes.io/name: hyptop-exporter
spec:
  namespaceSelector:
    matchNames:
      - hyptop-observe
  selector:
    matchLabels:
      app: hyptopmetric
  endpoints:
    - port: metrics
      path: /metrics
      scheme: http
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - action: replace
          targetLabel: job
          replacement: hyptop-exporter
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hyptop-exporter-alerts
  namespace: hyptop-observe
  labels:
    app.kubernetes.io/name: hyptop-exporter
spec:
  groups:
    - name: hyptop-exporter.rules
      rules:
        - alert: HyptopExporterTargetDown
          expr: up{job="hyptop-exporter"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Hyptop exporter target is down
            description: Prometheus cannot scrape hyptop exporter for 5 minutes.
        - alert: HyptopExporterCollectionFailing
          expr: max_over_time(hyptop_exporter_collection_success{job="hyptop-exporter"}[10m]) < 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Hyptop exporter collection failing
            description: hyptop exporter did not report a successful collection in the last 10 minutes.
        - alert: HyptopIFLUtilizationHighWarning
          expr: hyptop_lpar_core_per_num_cores_hyptop_percent > 70
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: IFL utilization is high
            description: The LPAR/VM {{ $labels.system}} IFL utilization (core/#core) {{ $value }} is above 70%; please closely monitor IFL utilization.
        - alert: HyptopIFLUtilizationHighCritical
          expr: hyptop_lpar_core_per_num_cores_hyptop_percent > 80
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: IFL utilization is critically high
            description: The LPAR/VM {{ $labels.system}} IFL utilization (core/#core) {{ $value }} has stayed above 80%; please take action to adjust IFL resource allocation.
