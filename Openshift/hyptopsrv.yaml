apiVersion: v1
kind: Service
metadata:
  name: hyptopmetric
  namespace: <your namespace>
  labels:
    app: hyptopmetric
    app.kubernetes.io/name: hyptop-exporter
spec:
  type: ExternalName
  externalName: <hyptop metric server DNS name>
  ports:
    - name: metrics
      port: 9105
      protocol: TCP
      targetPort: 9105
# For OCP user-workload-monitoring, apply Openshift/ocp-monitoring-stack.yaml
# (ServiceMonitor + PrometheusRule) in the same namespace after creating this Service.
# For in-cluster Prometheus (Openshift/prometheus-grafana-stack.yaml), scraping is
# configured in the prometheus ConfigMap static_configs target
# hyptopmetric.<namespace>.svc.cluster.local:9105
