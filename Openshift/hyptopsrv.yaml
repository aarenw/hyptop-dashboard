apiVersion: v1
kind: Service
metadata:
  name: hyptopmetric
  namespace: <your namespace>
  labels:
    app: hyptopmetric
spec:
  type: ExternalName
  externalName: <hyptop metric server DNS name>
  ports:
    - name: metrics
      port: 9105
      protocol: TCP
      targetPort: 9105
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hyptopmetric
  namespace: <your namespace>
spec:
  namespaceSelector:
    matchNames:
      - <your namespace>
  selector:
    matchLabels:
      app: hyptopmetric
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s