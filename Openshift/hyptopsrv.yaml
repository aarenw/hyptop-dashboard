apiVersion: v1
kind: Service
metadata:
  name: hyptopmetric
  namespace: <your namespace>
  labels:
    app: hyptopmetric
spec:
  type: ExternalName
  externalName: <hyptop metric server DNS name>
  ports:
    - name: metrics
      port: 9105
      protocol: TCP
      targetPort: 9105
# Optional: ServiceMonitor was only for Cluster Observability Operator.
# With in-cluster Prometheus (Openshift/prometheus-grafana-stack.yaml), scraping is
# configured in the prometheus ConfigMap static_configs target
# hyptopmetric.<namespace>.svc.cluster.local:9105
